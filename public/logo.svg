<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 130">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f3ff"/>
      <stop offset="100%" stop-color="#eff6ff"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="360" height="130" rx="18" fill="url(#sky)"/>

  <!-- Subtle horizon line -->
  <line x1="20" y1="92" x2="340" y2="92" stroke="#ddd6fe" stroke-width="0.8" opacity="0.6"/>

  <!-- Airplane (side view, gentle upward tilt) -->
  <g transform="translate(22, 28) rotate(-6)">
    <!-- fuselage -->
    <ellipse cx="38" cy="22" rx="34" ry="8" fill="#6d28d9"/>
    <!-- nose cone -->
    <path d="M70,22 Q82,22 86,22 Q82,18 70,18 Z" fill="#5b21b6"/>
    <!-- main wing -->
    <path d="M28,22 L8,8 L48,16 L48,22 Z" fill="#7c3aed"/>
    <path d="M28,24 L8,38 L48,30 L48,24 Z" fill="#7c3aed"/>
    <!-- tail fin vertical -->
    <path d="M6,20 L2,10 L10,18 Z" fill="#6d28d9"/>
    <!-- tail fin horizontal -->
    <path d="M6,24 L2,32 L10,26 Z" fill="#6d28d9"/>
    <!-- window strip -->
    <rect x="42" y="18" width="20" height="4" rx="2" fill="#c4b5fd" opacity="0.5"/>
  </g>

  <!-- Linaria flower sprig -->
  <g transform="translate(100, 18)">
    <!-- main stem -->
    <path d="M12,102 Q10,75 12,48 Q13,32 12,12" stroke="#86efac" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- branch left -->
    <path d="M12,52 Q4,44 2,36" stroke="#86efac" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- branch right -->
    <path d="M12,38 Q20,30 22,22" stroke="#86efac" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- Flower top of stem: two-lipped linaria bloom -->
    <!-- upper lip -->
    <ellipse cx="12" cy="10" rx="5" ry="7" fill="#9333ea"/>
    <!-- lower lip / spur -->
    <path d="M9,16 Q12,20 15,16" stroke="#7c3aed" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <circle cx="12" cy="21" r="1.2" fill="#a855f7" opacity="0.6"/>

    <!-- Flower on right branch -->
    <g transform="translate(22,20) rotate(25)">
      <ellipse cx="0" cy="0" rx="4" ry="6" fill="#a855f7"/>
      <path d="M-3,5 Q0,9 3,5" stroke="#9333ea" stroke-width="1.4" fill="none" stroke-linecap="round"/>
      <circle cx="0" cy="10" r="1" fill="#c084fc" opacity="0.6"/>
    </g>

    <!-- Flower on left branch -->
    <g transform="translate(2,34) rotate(-20)">
      <ellipse cx="0" cy="0" rx="3.5" ry="5.5" fill="#c084fc"/>
      <path d="M-3,5 Q0,8 3,5" stroke="#a855f7" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    </g>

    <!-- Small bud -->
    <ellipse cx="12" cy="28" rx="2.5" ry="4" fill="#7c3aed" opacity="0.5"/>
  </g>

  <!-- LINARIA text -->
  <text x="148" y="63"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="34"
    fill="#4c1d95"
    letter-spacing="1">Linaria</text>

  <!-- SKC tagline -->
  <text x="150" y="84"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="11"
    font-weight="300"
    fill="#7c3aed"
    letter-spacing="5">SKC · clear skies</text>
</svg>
